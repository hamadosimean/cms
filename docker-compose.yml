version: "3.8"

services:
  web:
    build: .
    container_name: school_management_web
    ports:
      - "3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/school_management
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      mongodb:
        condition: service_started
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: school_management_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=school_management
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: school_management_nginx
    ports:
      - "4444:80"
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  mongo_data:
